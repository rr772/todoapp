<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RyutaのToDoリスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #e5e7eb;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 64px 16px;
    }

    .container { width: 100%; max-width: 480px; }

    .header { margin-bottom: 32px; }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: #aaa; margin-top: 4px; }

    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .input-row input {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      border: 1px solid #e5e5e5; background: #fff;
      font-size: 14px; font-family: inherit; color: #1a1a1a;
      outline: none; transition: box-shadow 0.15s;
    }
    .input-row input::placeholder { color: #ccc; }
    .input-row input:focus { box-shadow: 0 0 0 2px #d1d5db; }
    .input-row button {
      padding: 12px 20px; background: #111; color: #fff;
      font-size: 14px; font-weight: 500; font-family: inherit;
      border: none; border-radius: 12px; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .input-row button:hover { background: #333; }
    .input-row button:active { transform: scale(0.96); }
    .input-row button:disabled { opacity: 0.3; cursor: not-allowed; }

    .filter-tabs {
      display: flex; gap: 4px; background: #d1d5db;
      padding: 4px; border-radius: 12px; margin-bottom: 16px;
    }
    .filter-tabs button {
      flex: 1; padding: 6px; font-size: 12px; font-weight: 500;
      font-family: inherit; border: none; border-radius: 8px;
      background: transparent; color: #6b7280; cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tabs button.active { background: #fff; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .empty { text-align: center; padding: 64px 0; font-size: 13px; color: #9ca3af; user-select: none; }

    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: #fff; border-radius: 12px;
      border: 2px solid transparent;
      transition: border-color 0.1s, opacity 0.15s;
    }
    .task-item:hover { border-color: #f0f0f0; }
    .task-item.dragging { opacity: 0.35; }
    .task-item.drag-over { border-color: #6b7280 !important; }

    /* ドラッグハンドル */
    .drag-handle {
      cursor: grab; color: #d1d5db; flex-shrink: 0;
      display: flex; align-items: center;
      opacity: 0; transition: opacity 0.15s;
    }
    .task-item:hover .drag-handle { opacity: 1; }
    .drag-handle:active { cursor: grabbing; }

    .check-btn {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #d1d5db; background: transparent;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.15s;
    }
    .check-btn:hover { border-color: #6b7280; }
    .check-btn.done { background: #111; border-color: #111; }
    .check-btn svg { display: none; }
    .check-btn.done svg { display: block; }

    .task-text {
      flex: 1; font-size: 14px; line-height: 1.6;
      color: #1f2937; transition: all 0.15s; word-break: break-all;
    }
    .task-text.done { color: #d1d5db; text-decoration: line-through; }

    .tag-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .tag-btn {
      width: 28px; height: 28px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; opacity: 0.25;
    }
    .tag-btn:hover { opacity: 0.6; background: #f3f4f6; }
    .tag-btn.active { opacity: 1; }
    .tag-btn.urgent.active  { background: #fff7ed; }
    .tag-btn.important.active { background: #fefce8; }

    .delete-btn {
      opacity: 0; padding: 4px; background: transparent;
      border: none; border-radius: 6px; color: #d1d5db;
      cursor: pointer; transition: all 0.15s; display: flex; flex-shrink: 0;
    }
    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #f87171; background: #fef2f2; }

    .footer { margin-top: 24px; display: flex; justify-content: flex-end; }
    .clear-btn { font-size: 12px; color: #9ca3af; background: none; border: none; cursor: pointer; font-family: inherit; transition: color 0.15s; }
    .clear-btn:hover { color: #f87171; }

    /* トースト */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      background: #1f2937; color: #fff;
      font-size: 13px; padding: 12px 16px;
      border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      display: flex; align-items: center; gap: 12px;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .toast.show { opacity: 1; pointer-events: auto; animation: fadeInUp 0.2s ease; }
    .toast-text { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .undo-btn {
      padding: 4px 10px; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 8px;
      color: #fff; font-size: 12px; font-family: inherit;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    }
    .undo-btn:hover { background: rgba(255,255,255,0.25); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* チェックマーク完了アニメーション */
    .check-btn.completing {
      animation: checkPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: visible !important;
      position: relative;
    }
    .check-btn.completing::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid #374151;
      animation: ringPulse 0.5s ease-out forwards;
      pointer-events: none;
    }
    .check-btn.completing svg path {
      stroke-dasharray: 12;
      stroke-dashoffset: 12;
      animation: drawCheck 0.25s ease-out 0.08s forwards;
    }
    @keyframes checkPop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    @keyframes ringPulse {
      0%   { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 0;   transform: scale(2.2); }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>RyutaのToDo</h1>
      <p id="subtitle">0件の未完了タスク</p>
    </div>

    <div class="input-row">
      <input id="task-input" type="text" placeholder="タスクを入力..." />
      <button id="add-btn" disabled>追加</button>
    </div>

    <div class="filter-tabs">
      <button class="active" data-filter="all">すべて</button>
      <button data-filter="active">未完了</button>
      <button data-filter="important">⭐重要</button>
      <button data-filter="urgent">🏃急ぎ</button>
      <button data-filter="done">完了済み</button>
    </div>

    <div class="task-list" id="task-list"></div>

    <div class="footer" id="footer" style="display:none;">
      <button class="clear-btn" id="clear-btn">完了済みを削除</button>
    </div>
  </div>

  <div class="toast" id="toast">
    <span class="toast-text" id="toast-text"></span>
    <button class="undo-btn" id="undo-btn">元に戻す</button>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('todo-tasks') || '[]');
    let filter = 'all';
    let justCompleted = new Set();
    let toastTimer = null;
    let lastCompletedId = null;
    let dragId = null;

    const input  = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const list   = document.getElementById('task-list');
    const subtitle = document.getElementById('subtitle');
    const footer = document.getElementById('footer');
    const clearBtn = document.getElementById('clear-btn');
    const toast  = document.getElementById('toast');
    const toastText = document.getElementById('toast-text');
    const undoBtn = document.getElementById('undo-btn');

    function save() { localStorage.setItem('todo-tasks', JSON.stringify(tasks)); }

    function render() {
      let filtered = tasks.filter(t => {
        if (filter === 'active')    return !t.done || justCompleted.has(t.id);
        if (filter === 'done')      return t.done;
        if (filter === 'important') return t.important && (!t.done || justCompleted.has(t.id));
        if (filter === 'urgent')    return t.urgent && (!t.done || justCompleted.has(t.id));
        return true;
      });

      filtered = [
        ...filtered.filter(t => !t.done || justCompleted.has(t.id)),
        ...filtered.filter(t => t.done && !justCompleted.has(t.id)),
      ];

      const active = tasks.filter(t => !t.done).length;
      subtitle.textContent = active === 0 ? 'すべて完了しました 🎉' : `${active}件の未完了タスク`;
      footer.style.display = tasks.length > 0 ? 'flex' : 'none';

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">タスクがありません</div>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task-item"
          data-id="${t.id}"
          draggable="true"
          ondragstart="onDragStart(event,'${t.id}')"
          ondragend="onDragEnd(event)"
          ondragover="onDragOver(event,'${t.id}')"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event,'${t.id}')">
          <div class="drag-handle">
            <svg width="10" height="14" viewBox="0 0 10 14" fill="#9ca3af">
              <circle cx="3" cy="2.5" r="1.2"/><circle cx="7" cy="2.5" r="1.2"/>
              <circle cx="3" cy="7"   r="1.2"/><circle cx="7" cy="7"   r="1.2"/>
              <circle cx="3" cy="11.5" r="1.2"/><circle cx="7" cy="11.5" r="1.2"/>
            </svg>
          </div>
          <button class="check-btn ${t.done ? 'done' : ''}" onclick="toggle('${t.id}')" aria-label="${t.done ? '未完了に戻す' : '完了にする'}">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1.5 5l2.5 2.5 4.5-4.5"/>
            </svg>
          </button>
          <span class="task-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</span>
          <div class="tag-btns">
            <button class="tag-btn urgent ${t.urgent ? 'active' : ''}" onclick="toggleTag('${t.id}','urgent')" title="急ぎ">🏃</button>
            <button class="tag-btn important ${t.important ? 'active' : ''}" onclick="toggleTag('${t.id}','important')" title="重要">⭐</button>
          </div>
          <button class="delete-btn" onclick="remove('${t.id}')" aria-label="削除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ---- Toast ---- */
    function showToast(text) {
      if (toastTimer) clearTimeout(toastTimer);
      toastText.textContent = `「${text}」を完了しました`;
      toast.classList.add('show');
      toastTimer = setTimeout(hideToast, 3000);
    }

    function hideToast() {
      toast.classList.remove('show');
      toastTimer = null;
    }

    undoBtn.addEventListener('click', () => {
      if (!lastCompletedId) return;
      tasks = tasks.map(t => t.id === lastCompletedId ? { ...t, done: false } : t);
      justCompleted.delete(lastCompletedId);
      lastCompletedId = null;
      save();
      render();
      hideToast();
    });

    /* ---- Task actions ---- */
    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now().toString(), text, done: false, urgent: filter === 'urgent', important: filter === 'important' });
      save(); render();
      input.value = ''; addBtn.disabled = true; input.focus();
    }

    function toggle(id) {
      const task = tasks.find(t => t.id === id);
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      if (task && !task.done) {
        lastCompletedId = id;
        justCompleted.add(id);
        showToast(task.text);
        setTimeout(() => { justCompleted.delete(id); render(); }, 3000);
      }
      render();
      // チェックアニメーション（render後にDOMが更新されてから付与）
      if (task && !task.done) {
        const btn = document.querySelector(`[data-id="${id}"] .check-btn`);
        if (btn) {
          btn.classList.add('completing');
          setTimeout(() => btn.classList.remove('completing'), 500);
        }
      }
    }

    function toggleTag(id, tag) {
      tasks = tasks.map(t => t.id === id ? { ...t, [tag]: !t[tag] } : t);
      save(); render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    /* ---- Drag & Drop ---- */
    function onDragStart(e, id) {
      dragId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        const el = document.querySelector(`[data-id="${id}"]`);
        if (el) el.classList.add('dragging');
      }, 0);
    }

    function onDragEnd(e) {
      document.querySelectorAll('.task-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over');
      });
      dragId = null;
    }

    function onDragOver(e, id) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (id === dragId) return;
      document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function onDrop(e, targetId) {
      e.preventDefault();
      if (!dragId || dragId === targetId) return;
      const fromIdx = tasks.findIndex(t => t.id === dragId);
      const toIdx   = tasks.findIndex(t => t.id === targetId);
      const newTasks = [...tasks];
      const [moved] = newTasks.splice(fromIdx, 1);
      newTasks.splice(toIdx, 0, moved);
      tasks = newTasks;
      save(); render();
    }

    /* ---- Events ---- */
    input.addEventListener('input', () => { addBtn.disabled = !input.value.trim(); });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    addBtn.addEventListener('click', addTask);

    document.querySelectorAll('.filter-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    clearBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    });

    render();
    input.focus();
  </script>
</body>
</html>
